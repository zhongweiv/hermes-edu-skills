<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Hermes Edu Skills demo video.">
    <title>Hermes Edu Skills Demo</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f7f8fb;
        --ink: #111827;
        --muted: #5f6b7a;
        --line: #dfe5ee;
        --accent: #0f766e;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--ink);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Microsoft YaHei", sans-serif;
      }

      main {
        width: min(1040px, calc(100% - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        margin-bottom: 24px;
      }

      h1 {
        margin: 0 0 10px;
        font-size: clamp(28px, 5vw, 48px);
        line-height: 1.08;
        letter-spacing: 0;
      }

      p {
        max-width: 760px;
        margin: 0;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.7;
      }

      .video-frame {
        overflow: hidden;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #000;
        box-shadow: 0 24px 64px rgba(17, 24, 39, 0.14);
      }

      video {
        display: block;
        width: 100%;
        aspect-ratio: 16 / 9;
        background: #000;
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 20px;
      }

      a {
        color: var(--accent);
        font-weight: 700;
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>Hermes Edu Skills Demo</h1>
        <p>
          30 秒了解如何把 Hermes Edu Skills 安装到 Hermes Agent，并快速使用中国教育场景的结构化 Skill。
        </p>
      </header>

      <section class="video-frame" aria-label="Hermes Edu Skills demo video">
        <video controls preload="metadata" poster="../assets/demo/poster.png">
          <source src="../assets/demo/preview.mp4" type="video/mp4">
          当前浏览器无法播放该视频，请下载 MP4 后查看。
        </video>
      </section>

      <nav class="links" aria-label="Demo links">
        <a href="../assets/demo/preview.mp4">下载 MP4</a>
        <a href="../">返回项目首页</a>
        <a href="https://github.com/zhongweiv/hermes-edu-skills">GitHub 仓库</a>
      </nav>
    </main>
  </body>
</html>
